<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Artist Discography Adder</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:7px}.app{max-width:900px;margin:auto;display:grid;gap:7px}.card,.hero{background:#121212;border-radius:13px;padding:9px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.hero{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#1b1b1b,#090909)}h1{font-size:18px;margin:0;letter-spacing:-.04em}h2{font-size:13px;margin:0 0 6px}.sub,.tiny{color:#b3b3b3;font-size:9px;line-height:1.25}.pill{font-size:9px;color:#b3b3b3;background:#222;border-radius:999px;padding:4px 6px}label{font-size:10px;font-weight:800;display:block;margin:0 0 3px}input,select,textarea{width:100%;background:#242424;color:#fff;border:1px solid transparent;border-radius:8px;padding:6px;font-size:10px;min-height:29px}textarea{min-height:78px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}button{border:0;border-radius:999px;min-height:27px;padding:4px 6px;font-size:9px;font-weight:900;background:#1ed760;color:#000}button.secondary{background:#2a2a2a;color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.09)}button.danger{background:#351818;color:#fff}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}.stat{background:#181818;border-radius:8px;text-align:center;padding:5px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.stat b{font-size:14px;display:block}.stat span{font-size:8px;color:#b3b3b3}pre{margin:0;max-height:170px;overflow:auto;background:#050505;color:#d9ffd9;border-radius:10px;padding:7px;font-size:9px;line-height:1.2;white-space:pre-wrap;word-break:break-word}.bar{height:7px;background:#242424;border-radius:999px;overflow:hidden}.bar>div{height:100%;width:0;background:#1ed760}@media(max-width:560px){body{padding:5px}.card,.hero{padding:7px}h1{font-size:16px}.grid,.grid4{gap:4px}button{min-height:24px;font-size:8px;padding:3px}input,select,textarea{font-size:9px;min-height:26px}pre{max-height:145px;font-size:8px}}
</style>
</head>
<body>
<div class="app">
<section class="hero"><div><h1>Artist Discography Adder</h1><div class="sub">Only adds artist album discographies. Built for speed.</div></div><div class="pill" id="statusPill">Logged out</div></section>
<section class="card"><h2>Controls</h2><div class="grid4"><button id="loginBtn">Log in</button><button id="logoutBtn" class="secondary">Log out</button><button id="resumeBtn" class="secondary">Resume</button><button id="resetBtn" class="danger">Reset</button></div><label style="margin-top:6px" for="redirectUri">Redirect URI</label><input id="redirectUri"><div class="tiny">Put this exact URL in Spotify Developer Dashboard.</div></section>
<section class="card"><h2>Discography job</h2><label for="artistInput">Paste artist URLs / URIs / IDs</label><textarea id="artistInput" placeholder="Leave blank to use artists from liked songs"></textarea><div class="grid2" style="margin-top:5px"><div><label for="releaseGroups">Release type</label><select id="releaseGroups"><option value="album">Albums only</option><option value="album,appears_on">Albums + featured on, no singles</option><option value="album,single">Albums + singles</option><option value="album,single,compilation,appears_on">Everything</option></select></div><div><label for="speedMode">Speed</label><select id="speedMode"><option value="max">Maximum</option><option value="fast">Fast</option><option value="balanced">Balanced</option><option value="safer">Safer</option></select></div></div><div class="grid2" style="margin-top:5px"><div><label for="chunkArtists">Artists per run</label><input id="chunkArtists" type="number" value="999" min="1"></div><div><label for="scanLimit">Artist page size</label><input id="scanLimit" type="number" value="10" min="1" max="50"></div></div><div class="grid" style="margin-top:6px"><button id="startBtn">Start fast add</button><button id="stopBtn" class="danger">Stop</button><button id="testBtn" class="secondary">Self-test</button></div><div class="tiny">Maximum is fastest. If Spotify sends 429, the app waits and retries.</div></section>
<section class="card"><h2>Progress</h2><div class="stats"><div class="stat"><b id="artistStat">0</b><span>artists</span></div><div class="stat"><b id="doneStat">0</b><span>done</span></div><div class="stat"><b id="albumStat">0</b><span>albums</span></div><div class="stat"><b id="saveStat">0</b><span>saved</span></div></div><div class="bar" style="margin-top:6px"><div id="progressBar"></div></div><div class="tiny" id="progressText">Idle.</div></section>
<section class="card"><h2>Output</h2><pre id="log"></pre></section>
</div>
<script>
const CLIENT_ID="b8db26e7cfff4475804ce186878db270",SCOPES="user-library-read user-library-modify",ACCOUNTS_BASE="https://accounts.spotify.com",API_BASE="https://api.spotify.com/v1",TOKEN_KEY="artistDiscographyAdder_token",STATE_KEY="artistDiscographyAdder_state_v1",SETTINGS_KEY="artistDiscographyAdder_settings_v1",SAVE_BATCH_SIZE=50;
const SPEEDS={max:{label:"Maximum",apiDelay:150,pageDelay:150,artistDelay:250,saveDelay:250,retryExtra:5},fast:{label:"Fast",apiDelay:700,pageDelay:1000,artistDelay:1500,saveDelay:1500,retryExtra:15},balanced:{label:"Balanced",apiDelay:1800,pageDelay:3000,artistDelay:5000,saveDelay:5000,retryExtra:45},safer:{label:"Safer",apiDelay:4000,pageDelay:9000,artistDelay:20000,saveDelay:20000,retryExtra:120}};
let cancelRequested=false,lastApiAt=0,tokenCache=null;
const $=id=>document.getElementById(id),sleep=ms=>new Promise(r=>setTimeout(r,ms));
function log(m){const e=$("log");e.textContent+=`[${new Date().toLocaleTimeString()}] ${m}\n`;e.scrollTop=e.scrollHeight}
function setStatus(m){$("progressText").textContent=m}function setProgress(d,t){$("progressBar").style.width=(t?Math.min(100,Math.round(d/t*100)):0)+"%"}
function getSettings(){return{redirectUri:($("redirectUri").value||location.href.split("#")[0].split("?")[0]).trim(),releaseGroups:$("releaseGroups").value,speedMode:$("speedMode").value,chunkArtists:Math.max(1,parseInt($("chunkArtists").value||"999",10)),scanLimit:Math.max(1,Math.min(50,parseInt($("scanLimit").value||"10",10)))}}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(getSettings()))}function loadSettings(){try{const s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}");$("redirectUri").value=s.redirectUri||location.href.split("#")[0].split("?")[0];$("releaseGroups").value=s.releaseGroups||"album";$("speedMode").value=s.speedMode||"max";$("chunkArtists").value=s.chunkArtists||999;$("scanLimit").value=s.scanLimit||10}catch{$("redirectUri").value=location.href.split("#")[0].split("?")[0]}}
function currentSpeed(){return SPEEDS[getSettings().speedMode]||SPEEDS.max}function updateLoginStatus(){const t=getToken();$("statusPill").textContent=t?.access_token?`Logged in · ${currentSpeed().label}`:"Logged out"}
function randomString(n=64){const c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~",b=new Uint8Array(n);crypto.getRandomValues(b);return Array.from(b,x=>c[x%c.length]).join("")}async function sha256(t){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(t))}function b64u(b){return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"")}
async function login(){saveSettings();const r=getSettings().redirectUri,v=randomString(96),ch=b64u(await sha256(v));sessionStorage.setItem("pkce_verifier",v);location.href=ACCOUNTS_BASE+"/authorize?"+new URLSearchParams({client_id:CLIENT_ID,response_type:"code",redirect_uri:r,code_challenge_method:"S256",code_challenge:ch,scope:SCOPES})}
async function handleRedirect(){const code=new URLSearchParams(location.search).get("code");if(!code)return;const v=sessionStorage.getItem("pkce_verifier");if(!v)return log("Missing PKCE verifier. Log in again.");const body=new URLSearchParams({client_id:CLIENT_ID,grant_type:"authorization_code",code,redirect_uri:getSettings().redirectUri,code_verifier:v}),res=await fetch(ACCOUNTS_BASE+"/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});if(!res.ok)return log("Login failed: "+await res.text());const tok=await res.json();tok.expires_at=Date.now()+tok.expires_in*1000-60000;localStorage.setItem(TOKEN_KEY,JSON.stringify(tok));tokenCache=tok;history.replaceState({},"",getSettings().redirectUri);log("Login complete.");updateLoginStatus()}
function getToken(){if(tokenCache)return tokenCache;try{return tokenCache=JSON.parse(localStorage.getItem(TOKEN_KEY)||"null")}catch{return null}}
async function refreshTokenIfNeeded(force=false){const t=getToken();if(!t?.access_token)throw new Error("Not logged in.");if(!force&&t.expires_at&&Date.now()<t.expires_at)return t.access_token;if(!t.refresh_token)throw new Error("Missing refresh token. Log in again.");const res=await fetch(ACCOUNTS_BASE+"/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({client_id:CLIENT_ID,grant_type:"refresh_token",refresh_token:t.refresh_token})});if(!res.ok)throw new Error("Refresh failed: "+await res.text());const n=await res.json(),m={...t,...n,refresh_token:n.refresh_token||t.refresh_token,expires_at:Date.now()+n.expires_in*1000-60000};localStorage.setItem(TOKEN_KEY,JSON.stringify(m));tokenCache=m;return m.access_token}
async function pace(d){const e=Date.now()-lastApiAt;if(e<d)await sleep(d-e);lastApiAt=Date.now()}
async function api(method,path,opts={},attempt=0){const sp=currentSpeed();await pace(sp.apiDelay);const tok=await refreshTokenIfNeeded(),url=path.startsWith("http")?path:API_BASE+path;let body=opts.body;const headers={Authorization:`Bearer ${tok}`,Accept:"application/json",...(opts.headers||{})};if(opts.json!==undefined){headers["Content-Type"]="application/json";body=JSON.stringify(opts.json)}let res;try{res=await fetch(url,{method,headers,body,cache:"no-store"})}catch(e){const w=Math.min(120000,3000*Math.pow(2,Math.min(attempt,5)));log(`Load failed. Retrying in ${Math.round(w/1000)}s...`);await sleep(w);return api(method,path,opts,attempt+1)}if(res.status===401&&attempt<2){await refreshTokenIfNeeded(true);return api(method,path,opts,attempt+1)}if(res.status===429){const ra=parseInt(res.headers.get("Retry-After")||"60",10),w=(ra+sp.retryExtra)*1000;log(`Spotify 429. Waiting ${Math.round(w/1000)}s...`);setStatus(`429 wait ${Math.round(w/1000)}s`);await sleep(w);return api(method,path,opts,attempt+1)}if(res.status>=500){const w=Math.min(120000,5000+attempt*15000);log(`Server ${res.status}. Retrying in ${Math.round(w/1000)}s...`);await sleep(w);return api(method,path,opts,attempt+1)}if(!res.ok)throw new Error(`Spotify API error ${res.status}: ${await res.text()}`);if(res.status===204)return null;const txt=await res.text();return txt?JSON.parse(txt):null}
function parseArtistId(v){const s=String(v||"").trim();let m=s.match(/artist[:/]([A-Za-z0-9]{22})/);if(m)return m[1];return /^[A-Za-z0-9]{22}$/.test(s)?s:null}
function splitArtistInput(t){return String(t||"").split(/[\s,]+/).map(parseArtistId).filter(Boolean)}function saveState(s){localStorage.setItem(STATE_KEY,JSON.stringify({...s,updatedAt:new Date().toISOString()}))}function loadState(){try{return JSON.parse(localStorage.getItem(STATE_KEY)||"null")}catch{return null}}
function updateStats(s){$("artistStat").textContent=s?.artists?.length||0;$("doneStat").textContent=s?.artistIndex||0;$("albumStat").textContent=s?.seenAlbumIds?.length||0;$("saveStat").textContent=s?.savedAlbumCount||0;setProgress(s?.artistIndex||0,s?.artists?.length||0)}
async function artistsFromLikedSongs(){log("Reading liked songs for artists...");const artists=new Map();let off=0,lim=50;while(!cancelRequested){const p=await api("GET",`/me/tracks?limit=${lim}&offset=${off}&market=US`);for(const it of p.items||[])for(const a of it.track?.artists||[])if(a.id)artists.set(a.id,a.name||a.id);log(`Liked songs scanned: ${Math.min(off+lim,p.total||0)}/${p.total||"?"}`);if(!p.next)break;off+=lim;await sleep(currentSpeed().pageDelay)}return Array.from(artists,([id,name])=>({id,name}))}
async function savePendingAlbums(s){const sp=currentSpeed();while(s.pendingAlbumIds.length){const batch=s.pendingAlbumIds.slice(0,SAVE_BATCH_SIZE);await api("PUT","/me/albums",{json:{ids:batch}});s.pendingAlbumIds=s.pendingAlbumIds.slice(batch.length);s.savedAlbumCount+=batch.length;saveState(s);updateStats(s);log(`Saved/submitted ${s.savedAlbumCount} album(s).`);await sleep(sp.saveDelay)}}
async function scanArtistAlbums(artist,s){const sp=currentSpeed();let off=s.artistPageOffset||0,added=0,lim=s.scanLimit||10;while(!cancelRequested){const p=await api("GET",`/artists/${artist.id}/albums?`+new URLSearchParams({include_groups:s.releaseGroups,market:"US",limit:String(lim),offset:String(off)}));for(const a of p.items||[])if(a.id&&!s.seenAlbumIds.includes(a.id)){s.seenAlbumIds.push(a.id);s.pendingAlbumIds.push(a.id);added++}s.artistPageOffset=off+(p.items||[]).length;saveState(s);if(s.pendingAlbumIds.length>=SAVE_BATCH_SIZE)await savePendingAlbums(s);log(`${artist.name}: loaded ${s.artistPageOffset}/${p.total??"?"}, new: ${added}`);if(!p.next||!(p.items||[]).length)break;off=s.artistPageOffset;await sleep(sp.pageDelay)}s.artistPageOffset=0;return added}
async function startJob({resume=false}={}){cancelRequested=false;saveSettings();updateLoginStatus();let s=resume?loadState():null;if(!s){let ids=splitArtistInput($("artistInput").value),artists=ids.length?ids.map(id=>({id,name:id})):await artistsFromLikedSongs();if(!artists.length)return log("No artists found.");const set=getSettings();s={version:1,artists,releaseGroups:set.releaseGroups,speedMode:set.speedMode,scanLimit:set.scanLimit,chunkArtists:set.chunkArtists,artistIndex:0,artistPageOffset:0,seenAlbumIds:[],pendingAlbumIds:[],savedAlbumCount:0,startedAt:new Date().toISOString()};saveState(s);log(`Job created: ${artists.length} artist(s), speed: ${set.speedMode}.`)}else{$("speedMode").value=s.speedMode||getSettings().speedMode;$("releaseGroups").value=s.releaseGroups||getSettings().releaseGroups;$("scanLimit").value=s.scanLimit||getSettings().scanLimit;$("chunkArtists").value=s.chunkArtists||getSettings().chunkArtists;log(`Resuming at artist ${s.artistIndex+1}/${s.artists.length}.`)}updateStats(s);const start=s.artistIndex,end=Math.min(s.artists.length,start+(s.chunkArtists||999));for(let i=start;i<end;i++){if(cancelRequested)break;s.artistIndex=i;saveState(s);updateStats(s);const a=s.artists[i];log(`\n[${i+1}/${s.artists.length}] ${a.name||a.id}`);setStatus(`Scanning ${a.name||a.id}`);await scanArtistAlbums(a,s);await savePendingAlbums(s);s.artistIndex=i+1;s.artistPageOffset=0;saveState(s);updateStats(s);if(i+1<end)await sleep(currentSpeed().artistDelay)}if(s.artistIndex>=s.artists.length){await savePendingAlbums(s);log("Done. Discography add complete.");setStatus("Complete.")}else{log(`Chunk complete. Saved at artist ${s.artistIndex+1}/${s.artists.length}. Press Resume later.`);setStatus("Paused after chunk.")}updateStats(s)}
async function selfTest(){log("Running self-test...");if(!getToken()?.access_token)throw new Error("Not logged in.");const me=await api("GET","/me");log(`Profile OK: ${me.display_name||me.id}`);const a=await api("GET","/me/albums?limit=1&offset=0");log(`Albums endpoint OK: ${a.total??0} saved albums visible.`);log("Self-test complete.")}
function resetEverything(){if(!confirm("Reset local progress and login token? This does not change Spotify."))return;localStorage.removeItem(TOKEN_KEY);localStorage.removeItem(STATE_KEY);tokenCache=null;log("Local app reset.");updateLoginStatus();updateStats(null)}
$("loginBtn").onclick=()=>login();$("logoutBtn").onclick=()=>{localStorage.removeItem(TOKEN_KEY);tokenCache=null;updateLoginStatus();log("Logged out locally.")};$("startBtn").onclick=async()=>{try{await startJob({resume:false})}catch(e){log("ERROR: "+(e.message||e));setStatus("Error.")}};$("resumeBtn").onclick=async()=>{try{await startJob({resume:true})}catch(e){log("ERROR: "+(e.message||e));setStatus("Error.")}};$("stopBtn").onclick=()=>{cancelRequested=true;log("Stop requested. Current request will finish first.")};$("resetBtn").onclick=()=>resetEverything();$("testBtn").onclick=async()=>{try{await selfTest()}catch(e){log("ERROR: "+(e.message||e))}};
["redirectUri","releaseGroups","speedMode","chunkArtists","scanLimit"].forEach(id=>$(id).addEventListener("change",()=>{saveSettings();updateLoginStatus()}));
loadSettings();handleRedirect();updateLoginStatus();updateStats(loadState());if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js?v=fast-discography").catch(()=>{});log("Ready.");
</script>
</body>
</html>
